name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  commitlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      npm_config_cache: ${{ runner.temp }}/npm-cache
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate Commit Messages
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            npm exec --yes --package @commitlint/cli@20.5.3 --package @commitlint/config-conventional@20.5.3 -- commitlint --from "origin/${{ github.base_ref }}" --to "${{ github.sha }}" --verbose
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            npm exec --yes --package @commitlint/cli@20.5.3 --package @commitlint/config-conventional@20.5.3 -- commitlint --from HEAD^ --to HEAD --verbose
          else
            npm exec --yes --package @commitlint/cli@20.5.3 --package @commitlint/config-conventional@20.5.3 -- commitlint --last --verbose
          fi

  changesets-status:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
    env:
      npm_config_cache: ${{ runner.temp }}/npm-cache
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check Changeset Coverage
        run: node scripts/check-changeset-status.mjs

  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CRITIQ_CORE_ROOT: ${{ github.workspace }}/critiq-core
      CRITIQ_SKIP_CORE_BUILD: '1'
    steps:
      - uses: actions/checkout@v6
        with:
          path: critiq-rules

      - uses: actions/checkout@v6
        with:
          repository: critiq-dev/critiq-core
          path: critiq-core

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            critiq-core/package-lock.json
            critiq-rules/package-lock.json

      - name: Install critiq-core
        working-directory: critiq-core
        run: npm ci

      - name: Build critiq-core artifacts
        working-directory: critiq-core
        run: |
          npm run build
          npm run build:release-cli

      - name: Install critiq-rules
        working-directory: critiq-rules
        run: npm ci

      - name: Verify Release Readiness
        working-directory: critiq-rules
        run: npm run release:verify
