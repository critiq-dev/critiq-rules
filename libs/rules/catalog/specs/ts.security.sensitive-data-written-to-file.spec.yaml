apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.security.sensitive-data-written-to-file.rule.yaml
fixtures:
  - name: flags sensitive data written to files
    sourcePath: ./fixtures/public-security/auth-files.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.sensitive-data-written-to-file
      allSeverities:
        - high
  - name: ignores nonsensitive file exports
    sourcePath: ./fixtures/public-security/auth-files.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []

