apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.performance.missing-batch-operations.rule.yaml
fixtures:
  - name: flags one-by-one loops when batch helpers are available
    observationPath: ./fixtures/ts.performance.missing-batch-operations/invalid.observation.json
    expect:
      findingCount: 1
      allRuleIds:
        - ts.performance.missing-batch-operations
      allSeverities:
        - medium
  - name: ignores observations without matching project facts
    observationPath: ./fixtures/project-common/valid.observation.json
    expect:
      findingCount: 0
      allRuleIds: []
