apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.performance.unbounded-growth-memory-leak.rule.yaml
fixtures:
  - name: flags unbounded growth of shared collections
    sourcePath: ./fixtures/ts.performance.unbounded-growth-memory-leak/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.performance.unbounded-growth-memory-leak
      allSeverities:
        - high
  - name: ignores local collection growth
    sourcePath: ./fixtures/ts.performance.unbounded-growth-memory-leak/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
