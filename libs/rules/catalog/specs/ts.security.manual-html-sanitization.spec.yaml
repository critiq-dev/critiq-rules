apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.security.manual-html-sanitization.rule.yaml
fixtures:
  - name: flags ad hoc HTML sanitization
    sourcePath: ./fixtures/public-security/browser-html.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.manual-html-sanitization
      allSeverities:
        - medium
  - name: ignores vetted HTML sanitization
    sourcePath: ./fixtures/public-security/browser-html.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []

