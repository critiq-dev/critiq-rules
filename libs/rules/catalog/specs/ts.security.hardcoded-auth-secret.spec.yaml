apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.security.hardcoded-auth-secret.rule.yaml
fixtures:
  - name: flags inline auth secrets
    sourcePath: ./fixtures/public-security/auth-files.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.hardcoded-auth-secret
      allSeverities:
        - critical
  - name: ignores auth flows without inline secrets
    sourcePath: ./fixtures/public-security/auth-files.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []

