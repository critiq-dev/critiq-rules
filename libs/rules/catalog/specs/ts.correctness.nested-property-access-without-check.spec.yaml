apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.correctness.nested-property-access-without-check.rule.yaml
fixtures:
  - name: flags deep request-property chains without checks
    sourcePath: ./fixtures/ts.correctness.nested-property-access-without-check/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.correctness.nested-property-access-without-check
      allSeverities:
        - medium
  - name: ignores nested property access with optional checks
    sourcePath: ./fixtures/ts.correctness.nested-property-access-without-check/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
