apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.correctness.unchecked-map-key-access.rule.yaml
fixtures:
  - name: flags map lookups without a presence check
    sourcePath: ./fixtures/ts.correctness.unchecked-map-key-access/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.correctness.unchecked-map-key-access
      allSeverities:
        - medium
  - name: ignores lookups guarded by has checks
    sourcePath: ./fixtures/ts.correctness.unchecked-map-key-access/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
  - name: ignores keyed writes that do not read from the collection
    sourcePath: ./fixtures/ts.correctness.unchecked-map-key-access/indexed-write.ts
    expect:
      findingCount: 0
      allRuleIds: []
  - name: ignores map lookups protected by logical has guards
    sourcePath: ./fixtures/ts.correctness.unchecked-map-key-access/logical-has.ts
    expect:
      findingCount: 0
      allRuleIds: []
