apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.security.express-insecure-cookie.rule.yaml
fixtures:
  - name: flags insecure Express cookie config
    sourcePath: ./fixtures/public-security/render-express.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.express-insecure-cookie
      allSeverities:
        - medium
  - name: ignores secure Express cookie config
    sourcePath: ./fixtures/public-security/render-express.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []

