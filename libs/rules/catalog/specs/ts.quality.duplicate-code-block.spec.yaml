apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.quality.duplicate-code-block.rule.yaml
fixtures:
  - name: flags duplicated code blocks across files
    observationPath: ./fixtures/ts.quality.duplicate-code-block/invalid.observation.json
    expect:
      findingCount: 1
      allRuleIds:
        - ts.quality.duplicate-code-block
      allSeverities:
        - low
  - name: ignores observations without matching project facts
    observationPath: ./fixtures/project-common/valid.observation.json
    expect:
      findingCount: 0
      allRuleIds: []
