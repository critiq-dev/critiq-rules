        - high
  - name: ignores safe tls verification in PHP
    sourcePath: ./fixtures/security.tls-verification-disabled/valid.php
    expect:
      findingCount: 0
      allRuleIds: []
  - name: flags disabled tls verification in Ruby
    sourcePath: ./fixtures/security.tls-verification-disabled/invalid.rb
    expect:
