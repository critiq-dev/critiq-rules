apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/shared/security.no-hardcoded-credentials.rule.yaml
fixtures:
  - name: flags hardcoded password literal
    sourcePath: ./fixtures/security.no-hardcoded-credentials/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - security.no-hardcoded-credentials
      allSeverities:
        - critical
  - name: ignores environment-backed secrets
    sourcePath: ./fixtures/security.no-hardcoded-credentials/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
  - name: flags hardcoded credentials in Go
    sourcePath: ./fixtures/security.no-hardcoded-credentials/invalid.go
    expect:
      findingCount: 1
      allRuleIds:
        - security.no-hardcoded-credentials
      allSeverities:
        - critical
  - name: ignores non-literal credentials in Go
    sourcePath: ./fixtures/security.no-hardcoded-credentials/valid.go
    expect:
      findingCount: 0
      allRuleIds: []
  - name: flags hardcoded credentials in Python
    sourcePath: ./fixtures/security.no-hardcoded-credentials/invalid.py
    expect:
      findingCount: 1
      allRuleIds:
        - security.no-hardcoded-credentials
      allSeverities:
        - critical
  - name: ignores non-literal credentials in Python
    sourcePath: ./fixtures/security.no-hardcoded-credentials/valid.py
    expect:
      findingCount: 0
      allRuleIds: []
