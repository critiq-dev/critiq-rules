apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.security.token-or-session-not-validated.rule.yaml
fixtures:
  - name: flags token use before verification
    sourcePath: ./fixtures/ts.security.token-or-session-not-validated/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.token-or-session-not-validated
