apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.security.no-dynamic-execution.rule.yaml
fixtures:
  - name: flags eval execution
    sourcePath: ./fixtures/ts.security.no-dynamic-execution/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.no-dynamic-execution
      allSeverities:
        - high
      summaryContains:
        - executes dynamic code
  - name: ignores ordinary string processing
    sourcePath: ./fixtures/ts.security.no-dynamic-execution/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
