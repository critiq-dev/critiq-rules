apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.security.insecure-http-transport.rule.yaml
fixtures:
  - name: flags plain http outbound requests
    observationPath: ./fixtures/ts.security.insecure-http-transport/invalid.observation.json
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.insecure-http-transport
      allSeverities:
        - high
      summaryContains:
        - plain HTTP
  - name: ignores secure and local-development transport
    observationPath: ./fixtures/ts.security.insecure-http-transport/valid.observation.json
    expect:
      findingCount: 0
      allRuleIds: []

