apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.security.no-request-path-file-read.rule.yaml
fixtures:
  - name: flags request-controlled file reads
    sourcePath: ./fixtures/ts.security.no-request-path-file-read/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.no-request-path-file-read
      allSeverities:
        - high
      summaryContains:
        - request data
  - name: ignores validated path usage
    sourcePath: ./fixtures/ts.security.no-request-path-file-read/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
