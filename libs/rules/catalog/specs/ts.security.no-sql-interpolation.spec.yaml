apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.security.no-sql-interpolation.rule.yaml
fixtures:
  - name: flags interpolated sql query
    sourcePath: ./fixtures/ts.security.no-sql-interpolation/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.no-sql-interpolation
      allSeverities:
        - high
      titleContains:
        - Avoid interpolated SQL
  - name: ignores parameterized query
    sourcePath: ./fixtures/ts.security.no-sql-interpolation/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
