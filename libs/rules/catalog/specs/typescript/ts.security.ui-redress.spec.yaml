apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.security.ui-redress.rule.yaml
fixtures:
  - name: flags request-driven clickjacking headers
    sourcePath: ./fixtures/public-security/headers-nosql.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.ui-redress
      allSeverities:
        - high
  - name: flags disabled helmet frame protections
    sourcePath: ./fixtures/public-security/web-hardening.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.ui-redress
      allSeverities:
        - high
  - name: ignores fixed clickjacking headers
    sourcePath: ./fixtures/public-security/headers-nosql.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
