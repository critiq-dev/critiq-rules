apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.security.insecure-auth-cookie-flags.rule.yaml
fixtures:
  - name: flags auth cookie with missing protections
    sourcePath: ./fixtures/ts.security.insecure-auth-cookie-flags/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.insecure-auth-cookie-flags
      allSeverities:
        - high
