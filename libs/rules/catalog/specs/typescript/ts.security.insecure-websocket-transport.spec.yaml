apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.security.insecure-websocket-transport.rule.yaml
fixtures:
  - name: flags cleartext websocket URLs
    sourcePath: ./fixtures/public-security/browser-html.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.insecure-websocket-transport
      allSeverities:
        - high
  - name: ignores secure websocket URLs
    sourcePath: ./fixtures/public-security/browser-html.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
  - name: still flags cleartext loopback websocket URLs
    sourcePath: ./fixtures/public-security/browser-html.loopback.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.insecure-websocket-transport
      allSeverities:
        - high
