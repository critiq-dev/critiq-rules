apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.security.express-missing-helmet.rule.yaml
fixtures:
  - name: flags Express apps without helmet
    sourcePath: ./fixtures/public-security/render-express.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.express-missing-helmet
      allSeverities:
        - medium
  - name: ignores Express apps with helmet
    sourcePath: ./fixtures/public-security/render-express.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
  - name: ignores same-file wrappers that return helmet middleware
    sourcePath: ./fixtures/public-security/web-hardening.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
