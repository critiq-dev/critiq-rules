apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.performance.nested-loops-hot-path.rule.yaml
fixtures:
  - name: flags nested loops in one function
    sourcePath: ./fixtures/ts.performance.nested-loops-hot-path/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.performance.nested-loops-hot-path
