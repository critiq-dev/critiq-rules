apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.security.user-controlled-view-render.rule.yaml
fixtures:
  - name: flags request-controlled res.render view names
    sourcePath: ./fixtures/public-security/render-express.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.user-controlled-view-render
      allSeverities:
        - medium
  - name: ignores fixed res.render view names
    sourcePath: ./fixtures/public-security/render-express.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
  - name: ignores allowlisted res.render view names
    sourcePath: ./fixtures/ts.security.user-controlled-view-render/valid-allowlist.ts
    expect:
      findingCount: 0
      allRuleIds: []
