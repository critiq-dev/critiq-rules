apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.correctness.unhandled-async-error.rule.yaml
fixtures:
  - name: flags floating promise chains without catch
    sourcePath: ./fixtures/ts.correctness.unhandled-async-error/invalid.ts
    expect:
      findingCount: 1
