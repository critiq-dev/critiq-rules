apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.quality.logic-change-without-test-updates.rule.yaml
fixtures:
  - name: flags changed critical logic without changed tests
    observationPath: ./fixtures/ts.quality.logic-change-without-test-updates/invalid.observation.json
