apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.react.no-cascaded-effect-fetches.rule.yaml
fixtures:
  - name: flags sequential fetches inside a React effect
    observationPath: ./fixtures/ts.react.no-cascaded-effect-fetches/invalid.observation.json
    expect:
      findingCount: 1
      allRuleIds:
        - ts.react.no-cascaded-effect-fetches
      allSeverities:
        - medium
  - name: ignores parallelized fetches in an effect
    observationPath: ./fixtures/ts.react.no-cascaded-effect-fetches/valid.observation.json
    expect:
      findingCount: 0
      allRuleIds: []
