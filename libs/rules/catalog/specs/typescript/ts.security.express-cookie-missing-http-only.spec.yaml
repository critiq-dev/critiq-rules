apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.security.express-cookie-missing-http-only.rule.yaml
fixtures:
  - name: flags script-readable Express cookies
    sourcePath: ./fixtures/public-security/auth-session-hardening.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.express-cookie-missing-http-only
      allSeverities:
        - medium
  - name: ignores HttpOnly Express cookies
    sourcePath: ./fixtures/public-security/auth-session-hardening.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
