apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.security.no-dynamic-execution.rule.yaml
fixtures:
  - name: flags eval execution
    sourcePath: ./fixtures/ts.security.no-dynamic-execution/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.no-dynamic-execution
      allSeverities:
        - high
      summaryContains:
        - executes dynamic code
  - name: ignores ordinary string processing
    sourcePath: ./fixtures/ts.security.no-dynamic-execution/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
  - name: flags vm execution helpers
    sourcePath: ./fixtures/ts.security.no-dynamic-execution/invalid-vm.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.no-dynamic-execution
      allSeverities:
        - high
  - name: ignores ordinary timer callbacks
    sourcePath: ./fixtures/ts.security.no-dynamic-execution/valid-timer.ts
    expect:
      findingCount: 0
      allRuleIds: []
