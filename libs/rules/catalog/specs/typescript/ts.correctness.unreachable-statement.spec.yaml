apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.correctness.unreachable-statement.rule.yaml
fixtures:
  - name: flags statements after return
    sourcePath: ./fixtures/ts.correctness.unreachable-statement/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.correctness.unreachable-statement
      allSeverities:
        - low
