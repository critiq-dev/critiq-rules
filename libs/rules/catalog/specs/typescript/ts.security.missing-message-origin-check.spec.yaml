apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.security.missing-message-origin-check.rule.yaml
fixtures:
  - name: flags message handlers without origin checks
    sourcePath: ./fixtures/public-security/browser-html.invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.missing-message-origin-check
      allSeverities:
        - high
  - name: ignores message handlers that check origin
    sourcePath: ./fixtures/public-security/browser-html.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []

