apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../../rules/typescript/ts.security.open-redirect.rule.yaml
fixtures:
  - name: flags request-controlled redirect targets
    sourcePath: ./fixtures/ts.security.open-redirect/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.security.open-redirect
      allSeverities:
        - high
  - name: ignores redirects after internal normalization
    sourcePath: ./fixtures/ts.security.open-redirect/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
  - name: ignores shared safe redirect helpers
    sourcePath: ./fixtures/ts.security.open-redirect/shared-safe-wrapper.valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
