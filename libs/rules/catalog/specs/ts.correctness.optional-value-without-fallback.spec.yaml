apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.correctness.optional-value-without-fallback.rule.yaml
fixtures:
  - name: flags optional values used directly in expressions
    sourcePath: ./fixtures/ts.correctness.optional-value-without-fallback/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.correctness.optional-value-without-fallback
      allSeverities:
        - medium
  - name: ignores optional values normalized with fallback
    sourcePath: ./fixtures/ts.correctness.optional-value-without-fallback/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
