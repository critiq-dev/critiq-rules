apiVersion: critiq.dev/v1alpha1
kind: RuleSpec
rulePath: ../rules/ts.quality.function-too-large-or-complex.rule.yaml
fixtures:
  - name: flags oversized functions
    sourcePath: ./fixtures/ts.quality.function-too-large-or-complex/invalid.ts
    expect:
      findingCount: 1
      allRuleIds:
        - ts.quality.function-too-large-or-complex
      allSeverities:
        - low
  - name: ignores small focused functions
    sourcePath: ./fixtures/ts.quality.function-too-large-or-complex/valid.ts
    expect:
      findingCount: 0
      allRuleIds: []
