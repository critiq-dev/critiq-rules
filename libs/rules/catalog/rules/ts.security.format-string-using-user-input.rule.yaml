apiVersion: critiq.dev/v1alpha1
kind: Rule
metadata:
  id: ts.security.format-string-using-user-input
  title: Avoid request-controlled format strings
  summary: Logging and formatting helpers should not take request input as the format string itself.
  rationale: Request-controlled format strings can corrupt logs, leak structure, or create unexpected formatting behavior.
  tags:
    - security
    - logging
    - input-validation
    - rules-catalog
  stability: stable
  appliesTo: block
scope:
  languages:
    - typescript
    - javascript
match:
  fact:
    kind: security.format-string-using-user-input
    bind: issue
emit:
  finding:
    category: security.input-validation
    severity: high
    confidence: 0.88
    tags:
      - security
      - logging
      - input-validation
  message:
    title: Treat `${captures.issue.text}` as data, not a format string
    summary: "`${captures.issue.text}` uses request-controlled input as the formatting template."
  remediation:
    summary: Keep the format string fixed and pass request data as ordinary values or structured fields.

